<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicture</title>
    <style>
        :root {
            --color-teal-500: #21808d;
            --bg: #fcfcf9;
            --surface: #ffffff;
            --text: #13343b;
            --color-border: rgba(94, 82, 64, 0.15);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1c1c;
                --surface: #262828;
                --text: #f5f5f5;
                --color-border: rgba(255, 255, 255, 0.1);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 70px; min-height: 100vh; }
        
        /* Header & Nav */
        .header { position: sticky; top: 0; background: var(--surface); padding: 15px; border-bottom: 1px solid var(--color-border); z-index: 100; text-align: center; }
        .header h1 { color: var(--color-teal-500); font-size: 20px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--color-border); display: flex; height: 60px; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text); opacity: 0.5; cursor: pointer; border: none; background: none; }
        .nav-item.active { color: var(--color-teal-500); opacity: 1; font-weight: bold; }

        /* Views */
        .main-content { max-width: 500px; margin: 0 auto; }
        .view { display: none; padding-top: 10px; }
        .view.active { display: block; }
        
        /* Cards */
        .post-card { background: var(--surface); border-bottom: 1px solid var(--color-border); margin-bottom: 15px; }
        .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; background: #333; }
        .post-info { padding: 12px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* Modal & Loader */
        #loadingScreen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #loginModal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: var(--surface); padding: 35px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--color-border); border-radius: 10px; background: var(--bg); color: var(--text); }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--color-teal-500); color: white; }
    </style>
</head>
<body>

    <div id="loadingScreen">Wicture lädt...</div>

    <header class="header"><h1>Wicture</h1></header>

    <div class="main-content">
        <div id="feedView" class="view active">
            <div id="feedContainer"></div>
        </div>
        <div id="exploreView" class="view">
            <div id="exploreGrid" class="grid"></div>
        </div>
        <div id="uploadView" class="view" style="padding: 20px; text-align: center;">
            <div id="uploadArea" style="border: 2px dashed var(--color-border); padding: 40px; border-radius: 15px;" onclick="document.getElementById('fileInput').click()">
                <p>Wochenfoto wählen</p>
            </div>
        </div>
        <div id="profileView" class="view">
            <div id="profileContent" style="padding: 20px;"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" data-view="feed"><span>Feed</span></button>
        <button class="nav-item" data-view="explore"><span>Entdecken</span></button>
        <button class="nav-item" data-view="upload"><span>Posten</span></button>
        <button class="nav-item" data-view="profile"><span>Profil</span></button>
    </nav>

    <div id="loginModal">
        <div class="modal-box">
            <h2>Anmelden</h2>
            <p style="margin-bottom: 20px; opacity: 0.7;">Willkommen zurück!</p>
            <input type="email" id="loginEmail" placeholder="E-Mail">
            <input type="password" id="loginPassword" placeholder="Passwort">
            <button onclick="handleLogin()" class="btn btn-primary">Einloggen</button>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" hidden>
    <div id="toast" style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:8px 16px; border-radius:20px; display:none; z-index:5000;"></div>
