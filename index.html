<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicture</title>
    <style>
        :root {
            --color-teal-500: #21808d;
            --color-border: rgba(94, 82, 64, 0.15);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --bg: #fcfcf9;
            --surface: #ffffff;
            --text: #13343b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1c1c;
                --surface: #262828;
                --text: #f5f5f5;
                --color-border: rgba(255, 255, 255, 0.1);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-family); background: var(--bg); color: var(--text); padding-bottom: 70px; min-height: 100vh; }
        
        .header { position: sticky; top: 0; background: var(--surface); padding: 15px; border-bottom: 1px solid var(--color-border); z-index: 100; text-align: center; }
        .header h1 { color: var(--color-teal-500); font-size: 20px; }
        
        .main-content { max-width: 500px; margin: 0 auto; }
        .view { display: none; }
        .view.active { display: block; }
        
        .weekly-banner { padding: 16px; background: var(--surface); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; gap: 12px; }
        .weekly-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: rgba(33,128,141,0.1); color: var(--color-teal-500); }

        .post-card { background: var(--surface); border-bottom: 1px solid var(--color-border); margin-bottom: 10px; }
        .post-header { padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .post-actions { padding: 10px 16px; display: flex; gap: 15px; }
        .action-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text); }
        .post-caption { padding: 0 16px 12px; font-size: 14px; }

        .comments-section { padding: 12px 16px; border-top: 1px solid var(--color-border); background: rgba(0,0,0,0.02); }
        .comment-item { margin-bottom: 6px; font-size: 13px; }
        .comment-input-group { display: flex; gap: 8px; margin-top: 10px; }
        .comment-input { flex: 1; border: 1px solid var(--color-border); border-radius: 15px; padding: 6px 12px; font-size: 13px; outline: none; background: var(--bg); color: var(--text); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--color-border); display: flex; height: 60px; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text); opacity: 0.5; cursor: pointer; border: none; background: none; }
        .nav-item.active { color: var(--color-teal-500); opacity: 1; font-weight: bold; }

        #loginModal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: var(--surface); padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--color-border); border-radius: 10px; background: var(--bg); color: var(--text); }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; margin-top: 5px; }
        .btn-primary { background: var(--color-teal-500); color: white; }
    </style>
</head>
<body>

    <div id="loginModal">
        <div class="modal-box">
            <h2 style="color: var(--color-teal-500); margin-bottom: 10px;">Wicture</h2>
            <p style="margin-bottom: 20px; font-size: 14px; opacity: 0.7;">Ein Foto pro Woche.</p>
            <div id="loginFields">
                <input type="email" id="loginEmail" placeholder="E-Mail">
                <input type="password" id="loginPassword" placeholder="Passwort">
                <button onclick="handleLogin()" class="btn btn-primary">Anmelden</button>
                <button onclick="toggleAuth(true)" class="btn" style="background: none; font-size: 13px;">Konto erstellen</button>
            </div>
            <div id="signupFields" style="display: none;">
                <input type="text" id="signupUsername" placeholder="Benutzername">
                <input type="text" id="signupDisplayName" placeholder="Anzeigename">
                <input type="email" id="signupEmail" placeholder="E-Mail">
                <input type="password" id="signupPassword" placeholder="Passwort">
                <button onclick="handleSignup()" class="btn btn-primary">Registrieren</button>
                <button onclick="toggleAuth(false)" class="btn" style="background: none; font-size: 13px;">Zurück zum Login</button>
            </div>
        </div>
    </div>

    <header class="header"><h1>Wicture</h1></header>

    <div class="main-content">
        <div id="feedView" class="view active">
            <div class="weekly-banner" id="weeklyBanner"></div>
            <div id="feedContainer"></div>
        </div>
        <div id="exploreView" class="view">
            <div id="exploreGrid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;"></div>
        </div>
        <div id="uploadView" class="view" style="padding: 20px; text-align: center;">
            <div id="uploadArea" style="border: 2px dashed var(--color-border); padding: 40px; border-radius: 15px;" onclick="document.getElementById('fileInput').click()">
                <p>Wochenfoto wählen</p>
            </div>
        </div>
        <div id="profileView" class="view">
            <div id="profileContent"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" data-view="feed"><span>Feed</span></button>
        <button class="nav-item" data-view="explore"><span>Entdecken</span></button>
        <button class="nav-item" data-view="upload"><span>Posten</span></button>
        <button class="nav-item" data-view="profile"><span>Profil</span></button>
    </nav>

    <input type="file" id="fileInput" accept="image/*" hidden>
    <div id="toast" style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:8px 16px; border-radius:20px; display:none; z-index:3000;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://rkmsomwlhlsxfoqueyza.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrbXNvbXdsaGxzeGZvcXVleXphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwODg3MTAsImV4cCI6MjA4NzY2NDcxMH0.KG6qS93ndM3KYyp5pw8utSHJUSoVMv7SUUZ9cCDbIVo';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const state = { currentUser: null, posts: [], currentView: 'feed', weeklyPostDone: false };

        // --- Hilfsfunktionen ---
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
        
        function toggleAuth(isSignup) {
            document.getElementById('loginFields').style.display = isSignup ? 'none' : 'block';
            document.getElementById('signupFields').style.display = isSignup ? 'block' : 'none';
        }

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 1000;
                        let w = img.width, h = img.height;
                        if (w > MAX) { h *= MAX / w; w = MAX; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        canvas.toBlob(b => resolve(new File([b], file.name, {type: 'image/jpeg'})), 'image/jpeg', 0.8);
                    };
                };
            });
        }

        // --- Daten laden ---
        async function loadData() {
            const { data, error } = await supabaseClient.from('posts').select('*, post_likes(count), comments(*)').order('timestamp', { ascending: false });
            if (error) return;

            const userRes = await supabaseClient.auth.getUser();
            const user = userRes.data.user;
            let myLikes = [];
            if (user) {
                const { data: likes } = await supabaseClient.from('post_likes').select('post_id').eq('user_id', user.id);
                if (likes) myLikes = likes.map(l => String(l.post_id));
            }

            state.posts = data.map(p => ({
                ...p, id: String(p.id), image: p.image_url, 
                liked: myLikes.includes(String(p.id)), 
                likes: p.post_likes[0]?.count || 0,
                comments: (p.comments || []).sort((a,b) => new Date(a.created_at) - new Date(b.created_at))
            }));
            
            checkWeeklyStatus();
            render();
        }

        function checkWeeklyStatus() {
            const now = new Date();
            const weekStart = new Date(now.setDate(now.getDate() - (now.getDay() || 7) + 1)).setHours(0,0,0,0);
            state.weeklyPostDone = state.posts.some(p => p.username === state.currentUser?.username && new Date(p.timestamp).getTime() >= weekStart);
        }

        // --- Rendering ---
        function render() {
            const banner = document.getElementById('weeklyBanner');
            banner.innerHTML = state.weeklyPostDone 
                ? `<div class="weekly-icon">✓</div><div><b>Erledigt!</b> Nächster Post am Montag.</div>`
                : `<div class="weekly-icon">📸</div><div><b>Wochenfoto wartet!</b> Jetzt teilen.</div>`;

            if (state.currentView === 'feed') {
                document.getElementById('feedContainer').innerHTML = state.posts.map(p => `
                    <div class="post-card">
                        <div class="post-header">
                            <div class="avatar" style="background:${p.user_color}22; color:${p.user_color}">${p.display_name.charAt(0)}</div>
                            <b>${p.display_name}</b>
                        </div>
                        <img src="${p.image}" class="post-img">
                        <div class="post-actions">
                            <button onclick="toggleLike('${p.id}')" class="action-btn">${p.liked ? '❤️' : '🤍'} ${p.likes}</button>
                        </div>
                        <div class="post-caption"><b>${p.username}</b> ${p.caption}</div>
                        <div class="comments-section">
                            ${p.comments.map(c => `<div class="comment-item"><b>${c.username}:</b> ${c.content}</div>`).join('')}
                            <div class="comment-input-group">
                                <input type="text" id="com-${p.id}" class="comment-input" placeholder="Schreiben...">
                                <button onclick="addComment('${p.id}')" style="border:none; background:none; color:var(--color-teal-500); font-weight:600;">Post</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            if (state.currentView === 'explore') {
                document.getElementById('exploreGrid').innerHTML = state.posts.map(p => `<img src="${p.image}" style="width:100%; aspect-ratio:1/1; object-fit:cover;" onclick="switchView('feed')">`).join('');
            }

            if (state.currentView === 'profile') {
                const myPosts = state.posts.filter(p => p.username === state.currentUser?.username);
                document.getElementById('profileContent').innerHTML = `
                    <div style="padding:20px; text-align:center;">
                        <div class="avatar" style="width:60px; height:60px; margin:0 auto 10px; font-size:24px; background:${state.currentUser.color}22; color:${state.currentUser.color}">${state.currentUser.displayName.charAt(0)}</div>
                        <h3>${state.currentUser.displayName}</h3>
                        <button onclick="supabaseClient.auth.signOut().then(()=>location.reload())" class="btn" style="width:auto; padding:5px 15px; border:1px solid #ccc; background:none; margin-top:10px;">Logout</button>
                    </div>
                    <div style="display:grid; grid-template-columns: repeat(3,1fr); gap:2px;">
                        ${myPosts.map(p => `<img src="${p.image}" style="width:100%; aspect-ratio:1/1; object-fit:cover;">`).join('')}
                    </div>
                `;
            }
        }

        // --- Funktionen ---
        async function toggleLike(postId) {
            const user = (await supabaseClient.auth.getUser()).data.user;
            const post = state.posts.find(p => p.id === postId);
            if (post.liked) await supabaseClient.from('post_likes').delete().match({ post_id: postId, user_id: user.id });
            else await supabaseClient.from('post_likes').insert([{ post_id: postId, user_id: user.id }]);
            loadData();
        }

        async function addComment(postId) {
            const val = document.getElementById(`com-${postId}`).value;
            if (!val) return;
            const user = (await supabaseClient.auth.getUser()).data.user;
            await supabaseClient.from('comments').insert([{ post_id: postId, user_id: user.id, username: state.currentUser.username, content: val }]);
            loadData();
        }

        async function submitPost() {
            if (state.weeklyPostDone) return showToast("Bereits gepostet!");
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            showToast("Wird optimiert...");
            const comp = await compressImage(file);
            const path = `posts/${state.currentUser.username}_${Date.now()}.jpg`;
            await supabaseClient.storage.from('wicture-images').upload(path, comp);
            const { data: { publicUrl } } = supabaseClient.storage.from('wicture-images').getPublicUrl(path);
            await supabaseClient.from('posts').insert([{ 
                username: state.currentUser.username, display_name: state.currentUser.displayName, 
                user_color: state.currentUser.color, image_url: publicUrl, caption: 'Mein Wochenfoto 📸' 
            }]);
            switchView('feed');
            loadData();
        }

        document.getElementById('fileInput').onchange = () => {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('uploadArea').innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px; margin-bottom:10px;"><button onclick="submitPost()" class="btn btn-primary">Jetzt Posten</button>`;
                };
                reader.readAsDataURL(file);
            }
        };

        function switchView(v) {
            state.currentView = v;
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(v + 'View').classList.add('active');
            document.querySelector(`[data-view="${v}"]`).classList.add('active');
            render();
        }

        document.querySelectorAll('.nav-item').forEach(btn => btn.onclick = () => switchView(btn.dataset.view));

        // --- Auth ---
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
        }

        async function handleSignup() {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const user = document.getElementById('signupUsername').value;
            const disp = document.getElementById('signupDisplayName').value;
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) return alert(error.message);
            await supabaseClient.from('users').insert([{ user_id: data.user.id, username: user, display_name: disp, user_color: '#21808D', email: email }]);
            location.reload();
        }

        document.addEventListener('DOMContentLoaded', () => {
            supabaseClient.auth.onAuthStateChange(async (event, session) => {
                if (session) {
                    const { data: prof } = await supabaseClient.from('users').select('*').eq('user_id', session.user.id).maybeSingle();
                    if (prof) {
                        state.currentUser = { username: prof.username, displayName: prof.display_name, color: prof.user_color };
                        document.getElementById('loginModal').style.display = 'none';
                        loadData();
                    }
                } else {
                    document.getElementById('loginModal').style.display = 'flex';
                }
            });
        });
    </script>
</body>
</html>
