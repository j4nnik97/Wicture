<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicture</title>
    <style>
        :root {
            --color-white: rgba(255, 255, 255, 1);
            --color-cream-50: rgba(252, 252, 249, 1);
            --color-cream-100: rgba(255, 255, 253, 1);
            --color-gray-200: rgba(245, 245, 245, 1);
            --color-gray-300: rgba(167, 169, 169, 1);
            --color-gray-400: rgba(119, 124, 124, 1);
            --color-slate-500: rgba(98, 108, 113, 1);
            --color-brown-600: rgba(94, 82, 64, 1);
            --color-charcoal-700: rgba(31, 33, 33, 1);
            --color-charcoal-800: rgba(38, 40, 40, 1);
            --color-slate-900: rgba(19, 52, 59, 1);
            --color-teal-300: rgba(50, 184, 198, 1);
            --color-teal-400: rgba(45, 166, 178, 1);
            --color-teal-500: rgba(33, 128, 141, 1);
            --color-teal-600: rgba(29, 116, 128, 1);
            --color-teal-700: rgba(26, 104, 115, 1);
            --color-red-400: rgba(255, 84, 89, 1);

            --color-brown-600-rgb: 94, 82, 64;
            --color-teal-500-rgb: 33, 128, 141;
            --color-slate-900-rgb: 19, 52, 59;
            --color-gray-400-rgb: 119, 124, 124;
            --color-teal-300-rgb: 50, 184, 198;
            --color-gray-300-rgb: 167, 169, 169;
            --color-gray-200-rgb: 245, 245, 245;

            --color-background: var(--color-cream-50);
            --color-surface: var(--color-cream-100);
            --color-text: var(--color-slate-900);
            --color-text-secondary: var(--color-slate-500);
            --color-primary: var(--color-teal-500);
            --color-primary-hover: var(--color-teal-600);
            --color-primary-active: var(--color-teal-700);
            --color-border: rgba(var(--color-brown-600-rgb), 0.2);
            --color-card-border: rgba(var(--color-brown-600-rgb), 0.12);
            --color-btn-primary-text: var(--color-cream-50);
            --color-focus-ring: rgba(var(--color-teal-500-rgb), 0.4);
            --color-error: rgba(255, 84, 89, 1);

            --font-family-base: "FKGroteskNeue", "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.04), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            --radius-sm: 6px;
            --radius-base: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
            --duration-normal: 250ms;
            --ease-standard: cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-background: var(--color-charcoal-700);
                --color-surface: var(--color-charcoal-800);
                --color-text: var(--color-gray-200);
                --color-text-secondary: rgba(var(--color-gray-300-rgb), 0.7);
                --color-primary: var(--color-teal-300);
                --color-primary-hover: var(--color-teal-400);
                --color-primary-active: rgba(41, 150, 161, 1);
                --color-border: rgba(var(--color-gray-400-rgb), 0.3);
                --color-card-border: rgba(var(--color-gray-400-rgb), 0.2);
                --color-btn-primary-text: var(--color-slate-900);
                --color-focus-ring: rgba(var(--color-teal-300-rgb), 0.4);
                --color-error: rgba(255, 84, 89, 1);
            }
        }

        @font-face {
            font-family: 'FKGroteskNeue';
            src: url('https://r2cdn.perplexity.ai/fonts/FKGroteskNeue.woff2') format('woff2');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-family: var(--font-family-base);
            -webkit-font-smoothing: antialiased;
            background: var(--color-background);
            color: var(--color-text);
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-logo svg {
            width: 28px;
            height: 28px;
            color: var(--color-primary);
        }

        .header-logo h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--color-text);
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-base);
            border: none;
            background: transparent;
            color: var(--color-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background var(--duration-normal) var(--ease-standard);
        }

        .btn-icon:hover { background: rgba(var(--color-brown-600-rgb), 0.08); }

        @media (prefers-color-scheme: dark) {
            .btn-icon:hover { background: rgba(var(--color-gray-400-rgb), 0.15); }
        }

        .btn-icon svg { width: 22px; height: 22px; }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
        }

        .nav-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            font-size: 13px;
            font-weight: 500;
            font-family: var(--font-family-base);
            cursor: pointer;
            position: relative;
            transition: color var(--duration-normal) var(--ease-standard);
        }

        .nav-tab.active {
            color: var(--color-primary);
            font-weight: 600;
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 16px;
            right: 16px;
            height: 2px;
            background: var(--color-primary);
            border-radius: 1px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 0 0 80px;
        }

        /* View Containers */
        .view { display: none; }
        .view.active { display: block; }

        /* Weekly Banner */
        .weekly-banner {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
        }

        .weekly-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .weekly-icon.can-post {
            background: rgba(var(--color-teal-500-rgb), 0.12);
            color: var(--color-primary);
        }

        .weekly-icon.posted {
            background: rgba(var(--color-brown-600-rgb), 0.08);
            color: var(--color-text-secondary);
        }

        @media (prefers-color-scheme: dark) {
            .weekly-icon.can-post {
                background: rgba(var(--color-teal-300-rgb), 0.15);
            }
            .weekly-icon.posted {
                background: rgba(var(--color-gray-400-rgb), 0.12);
            }
        }

        .weekly-icon svg { width: 22px; height: 22px; }

        .weekly-info h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .weekly-info p {
            font-size: 12px;
            color: var(--color-text-secondary);
        }

        /* Post Card */
        .post-card {
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
        }

        .post-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        .post-user-info {
            flex: 1;
        }

        .post-username {
            font-size: 14px;
            font-weight: 600;
        }

        .post-meta {
            font-size: 11px;
            color: var(--color-text-secondary);
        }

        .post-image-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--color-background);
            overflow: hidden;
            position: relative;
        }

        .post-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-actions {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .action-btn {
            border: none;
            background: transparent;
            color: var(--color-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-family-base);
            font-size: 13px;
            padding: 4px;
            border-radius: var(--radius-sm);
            transition: all var(--duration-normal) var(--ease-standard);
        }

        .action-btn:hover { opacity: 0.7; }

        .action-btn svg { width: 22px; height: 22px; }

        .action-btn.liked { color: var(--color-error); }

        .like-count {
            font-size: 13px;
            font-weight: 600;
            padding: 0 16px 4px;
        }

        .post-caption {
            padding: 0 16px 12px;
            font-size: 13px;
            line-height: 1.5;
        }

        .post-caption strong {
            font-weight: 600;
            margin-right: 4px;
        }

        /* Profile View */
        .profile-header {
            padding: 24px 16px;
            display: flex;
            align-items: center;
            gap: 24px;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            flex-shrink: 0;
            border: 3px solid var(--color-primary);
        }

        .profile-stats {
            display: flex;
            gap: 24px;
            flex: 1;
            justify-content: center;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 18px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 11px;
            color: var(--color-text-secondary);
            margin-top: 2px;
        }

        .profile-bio {
            padding: 16px;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
        }

        .profile-bio h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .profile-bio p {
            font-size: 13px;
            color: var(--color-text-secondary);
            line-height: 1.4;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding: 2px;
        }

        .grid-item {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity var(--duration-normal) var(--ease-standard);
        }

        .grid-item:hover img { opacity: 0.85; }

        .grid-item-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity var(--duration-normal) var(--ease-standard);
            color: white;
            font-weight: 600;
            font-size: 14px;
            gap: 6px;
        }

        .grid-item:hover .grid-item-overlay { opacity: 1; }

        /* Upload View */
        .upload-area {
            padding: 16px;
        }

        .upload-dropzone {
            border: 2px dashed var(--color-border);
            border-radius: var(--radius-lg);
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all var(--duration-normal) var(--ease-standard);
            background: var(--color-surface);
        }

        .upload-dropzone:hover {
            border-color: var(--color-primary);
            background: rgba(var(--color-teal-500-rgb), 0.04);
        }

        @media (prefers-color-scheme: dark) {
            .upload-dropzone:hover {
                background: rgba(var(--color-teal-300-rgb), 0.06);
            }
        }

        .upload-dropzone svg {
            width: 48px;
            height: 48px;
            color: var(--color-text-secondary);
            margin-bottom: 12px;
        }

        .upload-dropzone h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .upload-dropzone p {
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .upload-preview {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .upload-preview.active {
            display: flex;
        }

        .upload-preview-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--color-background);
        }

        .upload-preview-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-caption-input {
            width: 100%;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-base);
            padding: 12px;
            font-size: 14px;
            font-family: var(--font-family-base);
            background: var(--color-surface);
            color: var(--color-text);
            resize: vertical;
            min-height: 80px;
            outline: none;
            transition: border-color var(--duration-normal) var(--ease-standard);
        }

        .upload-caption-input:focus {
            border-color: var(--color-primary);
        }

        .upload-caption-input::placeholder {
            color: var(--color-text-secondary);
        }

        .upload-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-base);
            font-size: 14px;
            font-weight: 500;
            font-family: var(--font-family-base);
            cursor: pointer;
            border: none;
            transition: all var(--duration-normal) var(--ease-standard);
        }

        .btn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px var(--color-focus-ring);
        }

        .btn-primary {
            background: var(--color-primary);
            color: var(--color-btn-primary-text);
            flex: 1;
        }

        .btn-primary:hover { background: var(--color-primary-hover); }
        .btn-primary:active { background: var(--color-primary-active); }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border);
        }

        .btn-secondary:hover { background: rgba(var(--color-brown-600-rgb), 0.06); }

        @media (prefers-color-scheme: dark) {
            .btn-secondary:hover { background: rgba(var(--color-gray-400-rgb), 0.12); }
        }

        /* Disabled Upload */
        .upload-disabled {
            padding: 48px 24px;
            text-align: center;
            background: var(--color-surface);
            border-radius: var(--radius-lg);
        }

        .upload-disabled svg {
            width: 48px;
            height: 48px;
            color: var(--color-text-secondary);
            margin-bottom: 12px;
        }

        .upload-disabled h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .upload-disabled p {
            font-size: 13px;
            color: var(--color-text-secondary);
            line-height: 1.5;
        }

        .countdown-timer {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 8px 16px;
            background: rgba(var(--color-teal-500-rgb), 0.08);
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 600;
            color: var(--color-primary);
        }

        @media (prefers-color-scheme: dark) {
            .countdown-timer {
                background: rgba(var(--color-teal-300-rgb), 0.1);
            }
        }

        /* Empty State */
        .empty-state {
            padding: 64px 24px;
            text-align: center;
        }

        .empty-state svg {
            width: 56px;
            height: 56px;
            color: var(--color-text-secondary);
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .empty-state p {
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            display: flex;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .bottom-nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            font-size: 10px;
            font-family: var(--font-family-base);
            cursor: pointer;
            gap: 3px;
            transition: color var(--duration-normal) var(--ease-standard);
        }

        .bottom-nav-item.active { color: var(--color-primary); }
        .bottom-nav-item svg { width: 24px; height: 24px; }

        .bottom-nav-item.upload-btn {
            color: var(--color-primary);
        }

        .upload-plus-circle {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-full);
            background: var(--color-primary);
            color: var(--color-btn-primary-text);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-plus-circle svg { width: 20px; height: 20px; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--color-text);
            color: var(--color-background);
            padding: 10px 20px;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transition: all 300ms var(--ease-standard);
            pointer-events: none;
            white-space: nowrap;
            z-index: 200;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Week Label Badge */
        .week-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: var(--radius-full);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(var(--color-teal-500-rgb), 0.1);
            color: var(--color-primary);
        }

        @media (prefers-color-scheme: dark) {
            .week-badge {
                background: rgba(var(--color-teal-300-rgb), 0.12);
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 0; }

        /* Responsive */
        @media (min-width: 600px) {
            .main-content {
                border-left: 1px solid var(--color-border);
                border-right: 1px solid var(--color-border);
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="12" cy="12" r="3.5"/>
                <circle cx="17.5" cy="6.5" r="1"/>
            </svg>
            <h1>Wicture</h1>
        </div>
        <div class="header-actions">
            <button class="btn-icon" id="searchBtn" aria-label="Suche">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Feed View -->
        <div class="view active" id="feedView">
            <div class="weekly-banner" id="weeklyBanner"></div>
            <div id="feedContainer"></div>
        </div>

        <!-- Explore View -->
        <div class="view" id="exploreView">
            <div style="padding: 12px 16px;">
                <h2 style="font-size: 16px; font-weight: 600; margin-bottom: 4px;">Entdecken</h2>
                <p style="font-size: 12px; color: var(--color-text-secondary);">Die besten Fotos dieser Woche</p>
            </div>
            <div class="profile-grid" id="exploreGrid"></div>
        </div>

        <!-- Upload View -->
        <div class="view" id="uploadView">
            <div class="upload-area" id="uploadArea"></div>
        </div>

        <!-- Profile View -->
        <div class="view" id="profileView">
            <div id="profileContent"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="bottom-nav-item active" data-view="feed" aria-label="Feed">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span>Feed</span>
        </button>
        <button class="bottom-nav-item" data-view="explore" aria-label="Entdecken">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <span>Entdecken</span>
        </button>

        function initSamplePosts() {
            const now = Date.now();
            const weekMs = 7 * 24 * 60 * 60 * 1000;

                const user = sampleUsers[i % sampleUsers.length];
                const weekOffset = Math.floor(i / 2);
                const timestamp = now - (weekOffset * weekMs) - Math.random() * 3 * 24 * 60 * 60 * 1000;

                posts.push({
                    id: 'post_' + i,
                    user: user,
                    image: sampleImages[i],
                    caption: sampleCaptions[i % sampleCaptions.length],
                    likes: Math.floor(Math.random() * 80) + 5,
                    liked: false,
                    timestamp: timestamp,
                    weekLabel: getWeekLabel(timestamp)
                });

            state.posts = posts;

        function getWeekLabel(timestamp) {
            const now = new Date();
            const date = new Date(timestamp);
            const startOfWeek = d => {
                const day = d.getDay();
                const diff = d.getDate() - day + (day === 0 ? -6 : 1);
                return new Date(d.getFullYear(), d.getMonth(), diff);
            };

            const currentWeekStart = startOfWeek(now).getTime();
            const postWeekStart = startOfWeek(date).getTime();

            if (postWeekStart === currentWeekStart) return 'Diese Woche';
            if (postWeekStart === currentWeekStart - 7 * 24 * 60 * 60 * 1000) return 'Letzte Woche';

            const weekNum = getISOWeek(date);
            return 'KW ' + weekNum;
        }

        function getISOWeek(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
        }

        function getStartOfCurrentWeek() {
            const now = new Date();
            const day = now.getDay();
            const diff = now.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(now.getFullYear(), now.getMonth(), diff).getTime();
        }

        function getEndOfCurrentWeek() {
            return getStartOfCurrentWeek() + 7 * 24 * 60 * 60 * 1000;
        }

        function checkWeeklyLimit() {
            const weekStart = getStartOfCurrentWeek();
            const myPosts = state.posts.filter(p =>
                p.user.username === state.currentUser.username && p.timestamp >= weekStart
            );
            state.weeklyPostDone = myPosts.length > 0;
            if (state.weeklyPostDone) {
                state.lastPostTimestamp = myPosts[0].timestamp;
                state.nextPostAvailable = getEndOfCurrentWeek();
            }
        }

        function timeAgo(ts) {
            const diff = Date.now() - ts;
            const mins = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            if (mins < 1) return 'Gerade eben';
            if (mins < 60) return mins + ' Min.';
            if (hours < 24) return hours + ' Std.';
            if (days < 7) return days + ' T.';
            return Math.floor(days / 7) + ' Wo.';
        }

        function formatCountdown(targetTs) {
            const diff = targetTs - Date.now();
            if (diff <= 0) return 'Jetzt verfügbar!';
            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            if (days > 0) return days + 'T ' + hours + 'Std';
            const mins = Math.floor((diff % 3600000) / 60000);
            return hours + 'Std ' + mins + 'Min';
        }

            const post = state.posts.find(p => p.id === postId);
            if (!post) return;

            try {
                if (post.liked) {
                    // Like entfernen
                    await supabaseClient
                        .from('post_likes')
                        .delete()
                        .match({ post_id: postId, user_id: auth.user.id });
                    
                    post.likes = Math.max(0, post.likes - 1);
                } else {
                    // Like hinzufügen
                    await supabaseClient
                        .from('post_likes')
                        .insert([{ post_id: postId, user_id: auth.user.id }]);
                    
                    post.likes += 1;
                }

                post.liked = !post.liked;
                renderFeed(); 
                // Der Zähler in der Tabelle 'posts' ist jetzt nur noch ein Backup, 
                // da wir oben die echten Counts laden.
            } catch (error) {
                console.error("Like-Fehler:", error);
            }
        }

       let selectedImageDataUrl = null;
        let selectedFile = null; // NEU: Hier merken wir uns die echte Datei

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            selectedFile = file; // Echte Datei speichern für den Upload

            const reader = new FileReader();
            reader.onload = function(evt) {
                selectedImageDataUrl = evt.target.result; // Nur noch für die Vorschau
                const dropzone = document.querySelector('.upload-dropzone');
                const preview = document.getElementById('uploadPreview');
                const previewImg = document.getElementById('previewImage');

                if (dropzone) dropzone.style.display = 'none';
                previewImg.src = selectedImageDataUrl;
                preview.classList.add('active');
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        });

        function cancelUpload() {
            selectedImageDataUrl = null;
            selectedFile = null;
            renderUpload();
        }

        async function submitPost() {
            if (!selectedFile) return;

            const postBtn = document.getElementById('postBtn');
            postBtn.disabled = true;
            postBtn.textContent = 'Wird hochgeladen...';

            try {
                // 1. Eindeutigen Dateinamen generieren
                const fileExt = selectedFile.name.split('.').pop();
                const fileName = `${state.currentUser.username}_${Date.now()}.${fileExt}`;
                const filePath = `posts/${fileName}`;

                // 2. Bild in den Supabase Bucket hochladen
                const { data: uploadData, error: uploadError } = await supabaseClient
                    .storage
                    .from('wicture-images')
                    .upload(filePath, selectedFile);

                if (uploadError) throw uploadError;

                // 3. Öffentlichen Link (URL) zum Bild abrufen
                const { data: publicUrlData } = supabaseClient
                    .storage
                    .from('wicture-images')
                    .getPublicUrl(filePath);

                const finalImageUrl = publicUrlData.publicUrl;

                // 4. Post mit der neuen URL in der Datenbank speichern
                const caption = document.getElementById('captionInput').value.trim() || 'Mein Wochenfoto 📸';

                const newPost = {
                    id: 'post_' + Date.now(),
                    user: state.currentUser,
                    image: finalImageUrl, // Hier landet jetzt der saubere Link!
                    caption: caption,
                    likes: 0,
                    liked: false,
                    timestamp: Date.now(),
                    weekLabel: getWeekLabel(Date.now())
                };

                await savePostToSupabase(newPost);

                state.posts.unshift(newPost);
                state.weeklyPostDone = true;
                state.lastPostTimestamp = Date.now();
                state.nextPostAvailable = getEndOfCurrentWeek();

                selectedImageDataUrl = null;
                selectedFile = null;
                showToast('Wochenfoto gepostet! 🎉');
                switchView('feed');
            } catch (error) {
                console.error("Upload Fehler:", error);
                showToast('Fehler beim Posten. Versuche es erneut.');
                postBtn.disabled = false;
                postBtn.textContent = 'Posten';
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // --- Navigation ---

        function switchView(viewName) {
            state.currentView = viewName;

            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.bottom-nav-item').forEach(b => b.classList.remove('active'));

            document.getElementById(viewName + 'View').classList.add('active');
            const navItem = document.querySelector(`.bottom-nav-item[data-view="${viewName}"]`);
            if (navItem) navItem.classList.add('active');

            if (viewName === 'feed') { renderWeeklyBanner(); renderFeed(); }
            if (viewName === 'explore') renderExplore();
            if (viewName === 'upload') renderUpload();
            if (viewName === 'profile') renderProfile();
        }

        document.querySelectorAll('.bottom-nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                switchView(btn.dataset.view);
            });
        });

        // --- Supabase Helper Functions ---

        async function loadPostsFromSupabase() {
    try {
        // 1. Abfrage an Supabase: Posts + Likes zählen + Kommentare holen
        const { data: postsData, error: postsError } = await supabaseClient
            .from('posts')
            .select(`
                *,
                post_likes (count),
                comments (*)
            `)
            .order('timestamp', { ascending: false });

        if (postsError) {
            console.error("Supabase Query Error:", postsError);
            throw postsError;
        }

        // 2. Eigene Likes des Nutzers für die roten Herzen laden
        let myLikes = [];
        const { data: userData } = await supabaseClient.auth.getUser();
        const user = userData?.user;

        if (user) {
            const { data: likesData } = await supabaseClient
                .from('post_likes')
                .select('post_id')
                .eq('user_id', user.id);
            if (likesData) myLikes = likesData.map(l => String(l.post_id));
        }

        // 3. WICHTIG: Daten Mapping (Hier lag der Fehler!)
        state.posts = postsData.map(post => {
            // Sicherstellen, dass wir den Like-Count richtig extrahieren
            const likeCount = (post.post_likes && post.post_likes[0]) 
                ? post.post_likes[0].count 
                : 0;

            // Kommentare sortieren (älteste zuerst, damit es ein Chat-Verlauf ist)
            const sortedComments = (post.comments || []).sort((a, b) => 
                new Date(a.created_at) - new Date(b.created_at)
            );

            return {
                id: String(post.id),
                user: {
                    username: post.username,
                    displayName: post.display_name,
                    color: post.user_color
                },
                image: post.image_url, // <--- Das muss exakt so heißen wie in der DB
                caption: post.caption,
                likes: likeCount,
                liked: myLikes.includes(String(post.id)),
                comments: sortedComments,
                timestamp: new Date(post.timestamp).getTime(),
                weekLabel: getWeekLabel(new Date(post.timestamp).getTime())
            };
        });

        // 4. UI aktualisieren
        renderWeeklyBanner();
        renderFeed();
        
    } catch (error) {
        console.error('Failed to load posts:', error);
        showToast('Fehler beim Laden der Galerie');
    }
}

async function addComment(postId) {
    const input = document.getElementById(`comment-input-${postId}`);
    const content = input.value.trim();
    if (!content) return;

    // Button kurz deaktivieren, um Doppel-Klicks zu vermeiden
    const btn = input.nextElementSibling;
    btn.disabled = true;
    btn.style.opacity = '0.5';

    try {
        const { data: { user } } = await supabaseClient.auth.getUser();
        
        const { error } = await supabaseClient
            .from('comments')
            .insert([{
                post_id: postId,
                user_id: user.id,
                username: state.currentUser.username,
                display_name: state.currentUser.displayName,
                user_color: state.currentUser.color,
                content: content
            }]);

        if (error) throw error;

        input.value = '';
        // Einfach den Feed neu laden, um den neuen Kommentar zu sehen
        await loadPostsFromSupabase(); 
        
    } catch (error) {
        console.error("Fehler beim Kommentieren:", error);
        showToast('Fehler beim Senden');
    } finally {
        btn.disabled = false;
        btn.style.opacity = '1';
    }
}

        async function savePostToSupabase(post) {
            try {
                const postData = {
                    username: post.user.username,
                    display_name: post.user.displayName,
                    user_color: post.user.color,
                    image_url: post.image,
                    caption: post.caption,
                    likes: post.likes,
                    timestamp: new Date(post.timestamp).toISOString()
                };

                const { error } = await supabaseClient
                    .from('posts')
                    .insert([postData]);

                if (error) throw error;
            } catch (error) {
                console.error('Failed to save post:', error);
                throw error;
            }
        }

        // --- Authentication Functions ---
        function showLoginModal() {
            document.getElementById('loginModal').style.display = 'flex';
        }

        function hideLoginModal() {
            document.getElementById('loginModal').style.display = 'none';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
        }

        function showSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
        }

        function generateUserColor() {
            const colors = ['#21808D', '#D97706', '#7C3AED', '#DC2626', '#059669', '#DB2777', '#2563EB', '#EA580C', '#16A34A'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showToast('Bitte alle Felder ausfüllen');
                return;
            }

            console.log('Login attempt:', email);

            try {
                const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                console.log('Auth response:', authData, authError);

                if (authError) {
                    console.error('Auth error:', authError);
                    throw authError;
                }

                const { data: userProfile, error: userError } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('email', email)
                    .single();

                console.log('User profile:', userProfile, userError);

                if (userError) {
                    console.error('User profile error:', userError);
                    throw userError;
                }

                state.currentUser = {
                    username: userProfile.username,
                    displayName: userProfile.display_name,
                    color: userProfile.user_color,
                    email: email
                };
                state.isAuthenticated = true;
                hideLoginModal();
                await loadPostsFromSupabase();
                showToast('Willkommen zurück! 👋');
            } catch (error) {
                console.error('Login error details:', error);
                showToast('Fehler: ' + error.message);
            }
        }

        async function handleSignup() {
            const username = document.getElementById('signupUsername').value.trim();
            const displayName = document.getElementById('signupDisplayName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            if (!username || !displayName || !email || !password) {
                showToast('Bitte alle Felder ausfüllen');
                return;
            }

            if (password.length < 6) {
                showToast('Passwort muss mindestens 6 Zeichen haben');
                return;
            }

            console.log('Signup attempt:', username, email);
            showToast('Konto wird erstellt...');

            try {
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        emailRedirectTo: window.location.origin
                    }
                });

                console.log('Signup auth response:', authData, authError);

                if (authError) {
                    console.error('Signup auth error:', authError);
                    throw authError;
                }

                if (authData.user && authData.user.identities && authData.user.identities.length === 0) {
                    throw new Error('E-Mail bereits registriert');
                }

                const userColor = generateUserColor();
                const { error: insertError } = await supabaseClient
                    .from('users')
                    .insert([{
                        user_id: authData.user.id,
                        username: username,
                        display_name: displayName,
                        email: email,
                        user_color: userColor
                    }]);

                console.log('User insert result:', insertError);

                if (insertError) {
                    console.error('User insert error:', insertError);
                    throw insertError;
                }

                state.currentUser = {
                    username: username,
                    displayName: displayName,
                    color: userColor,
                    email: email
                };
                state.isAuthenticated = true;
                hideLoginModal();
                await loadPostsFromSupabase();
                showToast('Konto erfolgreich erstellt! 🎉');
            } catch (error) {
                console.error('Signup error details:', error);
                showToast('Fehler: ' + error.message);
            }
        }

        function checkAuth() {
            if (!state.isAuthenticated) {
                showLoginModal();
                return false;
            }
            return true;
        }

        // --- Init ---
        console.log('Supabase client initialized:', !!supabaseClient);
        console.log('SUPABASE_URL:', SUPABASE_URL);
        
        if (checkAuth()) {
            loadPostsFromSupabase();
        }
    </script>
