<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wicture</title>
<style>
    :root {
        --color-teal-500: #21808d;
        --color-border: rgba(94, 82, 64, 0.15);
        --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        /* Helle Farben */
        --bg: #fcfcf9;
        --surface: #ffffff;
        --text: #13343b;
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --bg: #1a1c1c;
            --surface: #262828;
            --text: #f5f5f5;
            --color-border: rgba(255, 255, 255, 0.1);
        }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-family); background: var(--bg); color: var(--text); padding-bottom: 70px; }
    .header { position: sticky; top: 0; background: var(--surface); padding: 15px; border-bottom: 1px solid var(--color-border); z-index: 100; text-align: center; }
    .header h1 { color: var(--color-teal-500); font-size: 20px; }
    .main-content { max-width: 500px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }
    .post-card { background: var(--surface); border-bottom: 1px solid var(--color-border); margin-bottom: 10px; }
    .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    .post-info { padding: 12px; }
    .post-actions { padding: 0 12px 10px; }
    .action-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text); }
    .action-btn.liked { color: #ff5459; }
    .comments-list { font-size: 13px; margin-top: 10px; color: var(--text); border-top: 1px solid var(--color-border); padding-top: 8px; opacity: 0.8; }
    .comment-input-group { display: flex; gap: 8px; margin-top: 10px; }
    .comment-input { flex: 1; border: 1px solid var(--color-border); border-radius: 15px; padding: 5px 12px; font-size: 13px; outline: none; background: var(--bg); color: var(--text); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--color-border); display: flex; height: 60px; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text); opacity: 0.6; cursor: pointer; border: none; background: none; }
    .nav-item.active { color: var(--color-teal-500); opacity: 1; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
    #loginModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
    .modal-box { background: var(--surface); padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; color: var(--text); }
    .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .btn-primary { background: var(--color-teal-500); color: white; }
</style>
</head>
<body>

    <header class="header"><h1>Wicture</h1></header>

    <div class="main-content">
        <div id="feedView" class="view active">
            <div id="feedContainer"></div>
        </div>
        <div id="exploreView" class="view">
            <div id="exploreGrid" class="grid"></div>
        </div>
        <div id="uploadView" class="view" style="padding: 20px; text-align: center;">
            <div id="uploadArea" style="border: 2px dashed #ccc; padding: 40px; border-radius: 15px;" onclick="document.getElementById('fileInput').click()">
                <p>Foto für diese Woche wählen</p>
            </div>
        </div>
        <div id="profileView" class="view">
            <div id="profileContent" style="padding: 20px;"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" data-view="feed"><span>Feed</span></button>
        <button class="nav-item" data-view="explore"><span>Entdecken</span></button>
        <button class="nav-item" data-view="upload"><span>Posten</span></button>
        <button class="nav-item" data-view="profile"><span>Profil</span></button>
    </nav>

    <div id="loginModal">
        <div class="modal-box">
            <h2>Wicture</h2>
            <p style="margin-bottom: 20px; font-size: 14px; color: #666;">Ein Foto pro Woche.</p>
            <input type="email" id="loginEmail" placeholder="E-Mail">
            <input type="password" id="loginPassword" placeholder="Passwort">
            <button onclick="handleLogin()" class="btn btn-primary">Anmelden</button>
        </div>
    </div>

    <input type="file" id="fileInput" accept="image/*" hidden>
    <div id="toast" style="position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:8px 16px; border-radius:20px; display:none; z-index:2000;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://rkmsomwlhlsxfoqueyza.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrbXNvbXdsaGxzeGZvcXVleXphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwODg3MTAsImV4cCI6MjA4NzY2NDcxMH0.KG6qS93ndM3KYyp5pw8utSHJUSoVMv7SUUZ9cCDbIVo';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const state = { currentUser: null, posts: [], currentView: 'feed' };

        // --- BILD-KOMPRESSION (DER CREDIT-RETTER) ---
        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 1000;
                        let w = img.width, h = img.height;
                        if (w > MAX) { h *= MAX / w; w = MAX; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        canvas.toBlob(b => resolve(new File([b], file.name, {type: 'image/jpeg'})), 'image/jpeg', 0.8);
                    };
                };
            });
        }

        // --- Core Logik ---
        async function loadData() {
            const { data, error } = await supabaseClient.from('posts').select('*, post_likes(count), comments(*)').order('timestamp', { ascending: false });
            if (error) return;

            let myLikes = [];
            const user = (await supabaseClient.auth.getUser()).data.user;
            if (user) {
                const { data: likes } = await supabaseClient.from('post_likes').select('post_id').eq('user_id', user.id);
                if (likes) myLikes = likes.map(l => String(l.post_id));
            }

            state.posts = data.map(p => ({
                ...p, id: String(p.id), image: p.image_url, liked: myLikes.includes(String(p.id)), likes: p.post_likes[0]?.count || 0
            }));
            render();
        }

        function render() {
            if (state.currentView === 'feed') {
                document.getElementById('feedContainer').innerHTML = state.posts.map(p => `
                    <div class="post-card">
                        <div class="post-info"><b>${p.display_name}</b></div>
                        <img src="${p.image}" class="post-img">
                        <div class="post-actions">
                            <button class="action-btn ${p.liked ? 'liked' : ''}" onclick="toggleLike('${p.id}')">❤️ ${p.likes}</button>
                        </div>
                        <div class="post-info" style="padding-top:0;"><b>${p.username}</b> ${p.caption}</div>
                        <div class="comments-list" style="margin: 0 12px 12px;">
                            ${(p.comments || []).map(c => `<div><b>${c.username}:</b> ${c.content}</div>`).join('')}
                            <div class="comment-input-group">
                                <input type="text" id="com-${p.id}" class="comment-input" placeholder="Schreiben...">
                                <button onclick="addComment('${p.id}')" style="border:none; background:none; color:var(--color-teal-500); font-weight:600;">Post</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            if (state.currentView === 'explore') {
                document.getElementById('exploreGrid').innerHTML = state.posts.map(p => `<img src="${p.image}" onclick="switchView('feed')">`).join('');
            }
            if (state.currentView === 'profile') {
                const myPosts = state.posts.filter(p => p.username === state.currentUser?.username);
                document.getElementById('profileContent').innerHTML = `
                    <div style="text-align:center; margin-bottom:20px;">
                        <h3>${state.currentUser?.displayName}</h3>
                        <p>${myPosts.length} Wochen dabei</p>
                        <button onclick="supabaseClient.auth.signOut().then(()=>location.reload())" class="btn" style="border:1px solid #ddd; width:auto; padding: 5px 15px;">Abmelden</button>
                    </div>
                    <div class="grid">${myPosts.map(p => `<img src="${p.image}">`).join('')}</div>
                `;
            }
        }

        async function submitPost() {
            const file = document.getElementById('fileInput').files[0];
            if (!file || !state.currentUser) return;
            showToast("Verarbeite Bild...");
            const comp = await compressImage(file);
            const path = `posts/${state.currentUser.username}_${Date.now()}.jpg`;
            await supabaseClient.storage.from('wicture-images').upload(path, comp);
            const { data: { publicUrl } } = supabaseClient.storage.from('wicture-images').getPublicUrl(path);
            await supabaseClient.from('posts').insert([{
                username: state.currentUser.username, display_name: state.currentUser.displayName,
                user_color: state.currentUser.color, image_url: publicUrl, caption: 'Mein Wochenfoto'
            }]);
            showToast("Gepostet! 🎉");
            switchView('feed');
            loadData();
        }

        document.getElementById('fileInput').onchange = () => {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('uploadArea').innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px; margin-bottom:10px;"><button onclick="submitPost()" class="btn btn-primary">Jetzt Posten</button>`;
                };
                reader.readAsDataURL(file);
            }
        };

        async function toggleLike(postId) {
            const post = state.posts.find(p => p.id === postId);
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (post.liked) await supabaseClient.from('post_likes').delete().match({ post_id: postId, user_id: user.id });
            else await supabaseClient.from('post_likes').insert([{ post_id: postId, user_id: user.id }]);
            loadData();
        }

        async function addComment(postId) {
            const val = document.getElementById(`com-${postId}`).value;
            if (!val) return;
            await supabaseClient.from('comments').insert([{ post_id: postId, user_id: (await supabaseClient.auth.getUser()).data.user.id, username: state.currentUser.username, content: val }]);
            loadData();
        }

        function switchView(v) {
            state.currentView = v;
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(v + 'View').classList.add('active');
            document.querySelector(`[data-view="${v}"]`).classList.add('active');
            render();
        }

        document.querySelectorAll('.nav-item').forEach(btn => btn.onclick = () => switchView(btn.dataset.view));

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
        }

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 2500); }

        document.addEventListener('DOMContentLoaded', () => {
            supabaseClient.auth.onAuthStateChange(async (event, session) => {
                if (session) {
                    const { data: prof } = await supabaseClient.from('users').select('*').eq('user_id', session.user.id).single();
                    state.currentUser = { username: prof.username, displayName: prof.display_name, color: prof.user_color };
                    document.getElementById('loginModal').style.setProperty('display', 'none', 'important');
                    loadData();
                } else {
                    document.getElementById('loginModal').style.setProperty('display', 'flex', 'important');
                }
            });
        });
    </script>
</body>
</html>
